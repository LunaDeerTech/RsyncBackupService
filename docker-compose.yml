services:
  rbs:
    build:
      context: .
      args:
        GOPROXY: ${RBS_GOPROXY:-https://proxy.golang.org,direct}
    # image: rbs:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - rbs-data:/data
    environment:
      RBS_JWT_SECRET: ${RBS_JWT_SECRET}
      RBS_DATA_DIR: /data
      RBS_PORT: "8080"
      RBS_WORKER_POOL_SIZE: "3"
      RBS_LOG_LEVEL: info
    restart: unless-stopped

volumes:
  rbs-data: